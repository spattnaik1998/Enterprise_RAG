name: Gold-Task CI Gate

on:
  pull_request:
    branches: [main]
  schedule:
    # Run judge calibration weekly on Sundays at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update ci_baseline.json after run"
        required: false
        default: "false"
      run_calibration:
        description: "Run judge calibration job (true/false)"
        required: false
        default: "false"

jobs:
  eval:
    name: RAG Quality Gate (20 gold tasks)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache the FAISS index so Phase II does not re-run on every PR.
      # Key is based on a hash of the validated data directory.
      - name: Cache FAISS index
        id: cache-index
        uses: actions/cache@v4
        with:
          path: data/index
          key: faiss-index-${{ hashFiles('data/validated/**') }}
          restore-keys: faiss-index-

      - name: Build index (Phase II) if cache miss
        if: steps.cache-index.outputs.cache-hit != 'true'
        run: python -m src.main phase2
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run gold-task CI gate
        run: |
          if [ "${{ github.event.inputs.update_baseline }}" = "true" ]; then
            python -m eval.run_ci --update-baseline
          else
            python -m eval.run_ci
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload CI result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-eval-result
          path: eval/results/ci_baseline.json
          retention-days: 30

  calibrate-judge:
    runs-on: ubuntu-latest
    # Run weekly on Sunday (not every PR -- costs ~$0.05)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_calibration == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run judge calibration
        run: python -m eval.calibrate_judge
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
